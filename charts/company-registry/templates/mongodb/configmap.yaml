apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "company-registry.mongodb.name" . }}-init
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "company-registry.labels" . | nindent 4 }}
data:
  mongo-init.js: |
    const dbName = process.env.MONGO_INITDB_DATABASE || "person_db";
    db = db.getSiblingDB(dbName);

    db.createUser({
      user: process.env.MONGO_APP_USER,
      pwd:  process.env.MONGO_APP_PASSWORD,
      roles: [{ role: "readWrite", db: dbName }]
    });

    print("Created app user: " + process.env.MONGO_APP_USER);

    db.persons.insertMany([
      { id_number: "123456789", name: "Alice Johnson",  email: "alice.johnson@company.com",  age: 30, phone: "050-1234567" },
      { id_number: "987654321", name: "Bob Smith",      email: "bob.smith@company.com",      age: 45, phone: "052-9876543" },
      { id_number: "111222333", name: "Carol White",    email: "carol.white@company.com",    age: 27, phone: "054-1112223" },
      { id_number: "444555666", name: "David Brown",    email: "david.brown@company.com",    age: 38, phone: "058-4445556" },
      { id_number: "777888999", name: "Eva Martinez",   email: "eva.martinez@company.com",   age: 52, phone: "050-7778889" },
      { id_number: "101010101", name: "Frank Lee",      email: "frank.lee@company.com",      age: 23, phone: "052-1010101" },
      { id_number: "202020202", name: "Grace Kim",      email: "grace.kim@company.com",      age: 34, phone: "054-2020202" },
      { id_number: "303030303", name: "Henry Davis",    email: "henry.davis@company.com",    age: 61, phone: "058-3030303" }
    ]);

    print("Seeded " + db.persons.countDocuments() + " persons into " + dbName + ".persons");
