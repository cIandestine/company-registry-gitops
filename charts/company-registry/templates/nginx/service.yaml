apiVersion: v1
kind: Service
metadata:
  name: {{ include "company-registry.nginx.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "company-registry.nginx.name" . }}
    {{- include "company-registry.labels" . | nindent 4 }}
  annotations:
    # Provisions an AWS Network Load Balancer instead of Classic ELB
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: {{ include "company-registry.nginx.name" . }}
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
