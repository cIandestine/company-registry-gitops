apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "company-registry.nginx.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "company-registry.nginx.name" . }}
    {{- include "company-registry.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "company-registry.nginx.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "company-registry.nginx.name" . }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          env:
            - name: NGINX_UPSTREAM
              value: {{ include "company-registry.api.name" . }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
